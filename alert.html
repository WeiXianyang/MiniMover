<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>告警详情 - FireGuard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="prototype-title">
        <span>S04</span>
        <h1>FireGuard 工业巡检 APP</h1>
      </header>
      <section class="phone">
        <div class="speaker"></div>
        <div class="content">
          <header class="page-head">
            <div>
              <h2>告警详情</h2>
              <p>配电柜A疑似烟雾</p>
            </div>
            <span class="pill red">高等级告警</span>
          </header>

          <div class="alert-view"></div>

          <div class="card">
            <div class="row"><span>识别类型</span><strong>疑似烟雾 / 明火风险</strong></div>
            <div class="row"><span>置信度</span><strong>91%</strong></div>
            <div class="row"><span>温度</span><strong>37°C</strong></div>
          </div>

          <div class="card recommend">
            <span class="card-label">处置建议</span>
            <strong>派发应急配送，并通知现场人员确认。</strong>
          </div>

          <div class="actions">
            <a class="btn primary" href="./delivery.html">发起应急配送</a>
            <a class="btn" href="./manual.html">远程接管</a>
          </div>
        </div>
        <nav class="tabbar" aria-label="手机菜单">
          <a href="./index.html">连接</a>
          <a href="./home.html">主页</a>
          <a href="./map.html">地图</a>
          <a class="active" href="./alert.html">告警</a>
          <a href="./delivery.html">配送</a>
          <a href="./manual.html">接管</a>
          <a href="./report.html">报告</a>
        </nav>
      </section>
    </main>
  </body>
</html>
