name: car-ci

# Builds and packages the inspection-car Docker image.
#
# What this pipeline does (and why):
#   1. Syntax-checks every Python source in the repo.
#   2. Builds docker/Dockerfile.car into an image tagged with the commit SHA.
#   3. Saves the image to a .tar and uploads it as a build artifact.
#   4. On pushes to main, also pushes the image to GitHub Container Registry
#      (ghcr.io) so it can be pulled/deployed later.
#
# The real aarch64/Jetson hardware image is still built on the car itself
# (see docker/Dockerfile.car and the fireguard guide §10.2). This CI proves the
# app source is valid and produces a reproducible, deployable image artifact.

on:
  push:
    branches: [main, dev, dev_zhuyufan]
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: inspection-car

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout (skip LFS blobs — not needed for the build)
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Syntax-check all Python sources
        run: python -m compileall -q $(git ls-files '*.py')

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build car image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.car
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tar
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} -o ${{ env.IMAGE_NAME }}.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-image
          path: ${{ env.IMAGE_NAME }}.tar
          retention-days: 7

      # Publish to GHCR only on pushes to main (not on PRs, where the token
      # is read-only and secrets are unavailable).
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} "$IMAGE_LOWER:${{ github.sha }}"
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} "$IMAGE_LOWER:latest"
          docker push "$IMAGE_LOWER:${{ github.sha }}"
          docker push "$IMAGE_LOWER:latest"
