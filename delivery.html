<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>应急配送 - FireGuard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="prototype-title">
        <span>S05</span>
        <h1>FireGuard 工业巡检 APP</h1>
      </header>
      <section class="phone">
        <div class="speaker"></div>
        <div class="content">
          <header class="page-head">
            <div>
              <h2>应急配送</h2>
              <p>自动规划配送路径</p>
            </div>
            <span class="pill green">配送中</span>
          </header>

          <div class="card">
            <div class="row"><span>配送物资</span><strong>灭火器模型 / 急救包</strong></div>
            <div class="row"><span>起点</span><strong>应急物资点D</strong></div>
            <div class="row"><span>终点</span><strong>配电柜A</strong></div>
          </div>

          <div class="card recommend">
            <span class="card-label">配送路径</span>
            <strong>D 点装载 → 主通道 → 配电柜A</strong>
            <div class="bar"><i style="width: 68%"></i></div>
            <p>已完成 68%，当前绕过临时障碍物后继续前进。</p>
          </div>

          <div class="card">
            <div class="row"><span>任务状态</span><strong>配送中</strong></div>
            <div class="row"><span>载荷舱</span><strong>已锁定</strong></div>
            <div class="row"><span>目标确认</span><strong>待现场人员签收</strong></div>
          </div>

          <div class="actions single">
            <a class="btn" href="./home.html">取消配送并返回待命点</a>
          </div>
        </div>
        <nav class="tabbar" aria-label="手机菜单">
          <a href="./index.html">连接</a>
          <a href="./home.html">主页</a>
          <a href="./map.html">地图</a>
          <a href="./alert.html">告警</a>
          <a class="active" href="./delivery.html">配送</a>
          <a href="./manual.html">接管</a>
          <a href="./fleet.html">编队</a>
          <a href="./report.html">报告</a>
        </nav>
      </section>
    </main>
  </body>
</html>
