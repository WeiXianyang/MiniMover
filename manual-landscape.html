<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>手动接管横屏 - FireGuard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landscape-shell">
      <section class="landscape-phone" aria-label="S06-手动接管-横屏">
        <div class="landscape-scene"></div>
        <div class="landscape-road">
          <span class="card-label" style="position:absolute;left:600px;top:42px;">纸箱</span>
        </div>

        <div class="manual-status">
          <strong>手动接管</strong>
          <span>● 接管中　|　86%</span>
        </div>

        <div class="fps-panel">
          <a href="./manual-settings.html" aria-label="布局设置">
            <img class="icon" src="./icon/settings.svg" alt="" />
          </a>
          <strong>30 FPS</strong>
          <span>|</span>
          <span>●●●●○</span>
        </div>

        <div class="manual-toolrail">
          <span><img class="icon" src="./icon/lightbulb.svg" alt="" /></span>
          <span><img class="icon" src="./icon/mic.svg" alt="" /></span>
          <span><img class="icon" src="./icon/record.svg" alt="" /></span>
          <span><img class="icon" src="./icon/map.svg" alt="" /></span>
        </div>

        <div class="radar-widget" aria-label="雷达小窗">
          <img class="icon" src="./icon/radar.svg" alt="" />
          <span></span>
        </div>

        <div class="manual-joystick" aria-label="移动摇杆"></div>
        <div class="view-joystick" aria-label="视角摇杆"></div>

        <div class="manual-bottom-controls">
          <a class="round-control" href="./home.html?connected=1">
            <img class="icon" src="./icon/arrow-left.svg" alt="" />
          </a>
          <a class="emergency-control" href="./home.html?connected=1">
            <img class="icon" src="./icon/octagon-alert.svg" alt="" />
            急停
          </a>
          <div class="speed-control">速度 <strong>50%</strong></div>
        </div>
      </section>
    </main>
  </body>
</html>
