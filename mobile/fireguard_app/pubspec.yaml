name: fireguard_app
description: FireGuard 工业巡检 APP - 智能小车控制端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  flutter_svg: ^2.0.10+1
  shared_preferences: ^2.2.3
  webview_flutter: ^4.8.0
  speech_to_text: ^7.4.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/models/
